<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة تحكم المدير</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCJ83B2SofU5cBoeRN3XE215n2-Z8_HJl4",
      authDomain: "autolease-hub.firebaseapp.com",
      projectId: "autolease-hub",
      storageBucket: "autolease-hub.appspot.com",
      messagingSenderId: "142933547240",
      appId: "1:142933547240:web:fd123d30723c69c799915d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const codesList = document.getElementById("codesList");

    // توليد كود عشوائي مكون من 5 أرقام
    function generateCode() {
      return Math.floor(10000 + Math.random() * 90000).toString();
    }

    // إضافة الكود إلى Firestore
    document.getElementById("addCodeBtn").onclick = async () => {
      const amount = document.getElementById("amountInput").value;
      const code = generateCode();

      if (!amount || isNaN(amount)) {
        alert("الرجاء إدخال مبلغ صالح");
        return;
      }

      try {
        await addDoc(collection(db, "recharge_codes"), {
          code,
          amount: Number(amount),
          createdAt: new Date()
        });

        alert("تم إنشاء الكود بنجاح: " + code);
        loadCodes();
        document.getElementById("amountInput").value = "";
      } catch (err) {
        console.error(err);
        alert("حدث خطأ أثناء إنشاء الكود");
      }
    };

    // تحميل الأكواد من Firestore
    async function loadCodes() {
      codesList.innerHTML = "جاري التحميل...";
      const q = query(collection(db, "recharge_codes"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      let html = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        html += `<li class="border-b py-2 flex justify-between">
                  <span>${data.code}</span>
                  <span>${data.amount} ج.س</span>
                </li>`;
      });
      codesList.innerHTML = html || "<p>لا توجد أكواد حالياً</p>";
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      // تحميل الأكواد بعد التحقق
      loadCodes();
    });
  </script>
</head>
<body class="bg-gray-100 p-4 font-sans">

  <div class="max-w-md mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-bold mb-4 text-center text-yellow-600">لوحة تحكم المدير</h1>

    <div class="mb-4">
      <label class="block mb-1 text-sm font-semibold">المبلغ:</label>
      <input type="number" id="amountInput" placeholder="أدخل المبلغ" class="w-full border p-2 rounded" />
    </div>

    <button id="addCodeBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-2 rounded-xl font-semibold">
      إنشاء كود شحن
    </button>

    <hr class="my-6">

    <h2 class="text-lg font-bold mb-2">الأكواد الحالية:</h2>
    <ul id="codesList" class="text-sm text-gray-700 space-y-1"></ul>
  </div>

</body>
</html>
