<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Categories</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f7f7;
    }

    .search-bar {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 30px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card h3 {
      margin: 10px 0 5px;
      font-size: 16px;
    }

    .card p {
      color: gray;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .order-button {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .order-button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search for a car type..." />
  </div>

  <div class="grid" id="carGrid"></div>

  <script>
    const cars = [
      { name: "Pickup Truck", count: "205,258", img: "https://storage.googleapis.com/a1aa/image/zWGpuj2_2AqooIw6VeBMAA7ji5EGb05o8fT_uGQK3HI.jpg" },
      { name: "SUV", count: "362,419", img: "https://storage.googleapis.com/a1aa/image/zWGpuj2_2AqooIw6VeBMAA7ji5EGb05o8fT_uGQK3HI.jpg" },
      { name: "Sedan", count: "212,238", img: "https://storage.googleapis.com/a1aa/image/zWGpuj2_2AqooIw6VeBMAA7ji5EGb05o8fT_uGQK3HI.jpg" },
      { name: "Wagon", count: "74,146", img: "https://storage.googleapis.com/a1aa/image/zWGpuj2_2AqooIw6VeBMAA7ji5EGb05o8fT_uGQK3HI.jpg" },
      { name: "Minivan", count: "24,432", img: "https://storage.googleapis.com/a1aa/image/zWGpuj2_2AqooIw6VeBMAA7ji5EGb05o8fT_uGQK3HI.jpg" },
      { name: "Hatchback", count: "29,440", img: "https://storage.googleapis.com/a1aa/image/zWGpuj2_2AqooIw6VeBMAA7ji5EGb05o8fT_uGQK3HI.jpg" },
      { name: "Coupe", count: "18,310", img: "https://storage.googleapis.com/a1aa/image/zWGpuj2_2AqooIw6VeBMAA7ji5EGb05o8fT_uGQK3HI.jpg" },
      { name: "Convertible", count: "15,902", img: "https://storage.googleapis.com/a1aa/image/zWGpuj2_2AqooIw6VeBMAA7ji5EGb05o8fT_uGQK3HI.jpg" }
    ];

    const grid = document.getElementById("carGrid");
    const searchInput = document.getElementById("searchInput");

    function renderCars(filter = "") {
      grid.innerHTML = "";
      const filtered = cars.filter(car => car.name.toLowerCase().includes(filter.toLowerCase()));
      filtered.forEach(car => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${car.img}" alt="${car.name}">
          <h3>${car.name}</h3>
          <p>(${car.count} SDG)</p>
          <button class="order-button">Order</button>
        `;
        grid.appendChild(card);
      });
    }

    renderCars();

    searchInput.addEventListener("input", () => {
      renderCars(searchInput.value);
    });
  </script>
  

</body>
</html>
