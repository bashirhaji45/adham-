<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>حساباتي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCJ83B2SofU5cBoeRN3XE215n2-Z8_HJl4",
      authDomain: "autolease-hub.firebaseapp.com",
      projectId: "autolease-hub",
      storageBucket: "autolease-hub.appspot.com",
      messagingSenderId: "142933547240",
      appId: "1:142933547240:web:fd123d30723c69c799915d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const uid = user.uid;

        const userRef = doc(db, "captains", uid);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
          const data = userSnap.data();
          document.getElementById("balance").textContent = data.balance + " ج.س";
        }

        const txRef = collection(db, "captains", uid, "transactions");
        const txSnap = await getDocs(txRef);
        const txContainer = document.getElementById("transactions");

        txSnap.forEach(doc => {
          const tx = doc.data();
          const item = document.createElement("div");
          item.className = "bg-gray-100 rounded-lg p-3 shadow-sm mb-2";
          item.innerHTML = `
            <p class="font-semibold">${tx.type}</p>
            <p class="text-sm text-gray-600">${tx.amount} ج.س - ${new Date(tx.date).toLocaleDateString()}</p>
          `;
          txContainer.appendChild(item);
        });
      } else {
        window.location.href = "login.html";
      }
    });
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans">
  <!-- رأس الصفحة -->
  <header class="bg-yellow-500 text-white py-4 shadow-md">
    <h1 class="text-center text-xl font-bold">حساباتي</h1>
  </header>

  <!-- المحتوى -->
  <main class="flex-1 px-4 py-6">
    <div class="bg-white rounded-2xl shadow-lg p-6 max-w-md mx-auto">
      <h2 class="text-lg font-bold text-gray-700 mb-4">الرصيد الحالي:</h2>
      <p class="text-green-600 text-2xl font-bold mb-6" id="balance">...</p>

      <h3 class="text-md font-bold text-gray-700 mb-2">سجل العمليات:</h3>
      <div id="transactions">
        <p class="text-gray-400 text-sm">جاري التحميل...</p>
      </div>
    </div>
  </main>

  <!-- زر رجوع -->
  <footer class="text-center py-4">
    <a href="adham.htm" class="text-blue-600 hover:underline font-semibold">العودة إلى الملف الشخصي</a>
  </footer>
</body>
</html>
