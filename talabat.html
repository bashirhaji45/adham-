<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>طلباتي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCJ83B2SofU5cBoeRN3XE215n2-Z8_HJl4",
      authDomain: "autolease-hub.firebaseapp.com",
      projectId: "autolease-hub",
      storageBucket: "autolease-hub.appspot.com",
      messagingSenderId: "142933547240",
      appId: "1:142933547240:web:fd123d30723c69c799915d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const uid = user.uid;
        const ordersRef = collection(db, "orders");
        const q = query(ordersRef, where("captainId", "==", uid), where("status", "==", "active"));
        const querySnapshot = await getDocs(q);

        const container = document.getElementById("orders");

        if (querySnapshot.empty) {
          container.innerHTML = '<p class="text-gray-400 text-sm text-center">لا توجد طلبات حالياً</p>';
        } else {
          querySnapshot.forEach(doc => {
            const order = doc.data();
            const el = document.createElement("div");
            el.className = "bg-white rounded-lg shadow p-4 mb-3 border";
            el.innerHTML = `
              <p class="font-bold text-gray-700">العميل: ${order.customerName}</p>
              <p class="text-sm text-gray-600">الموقع: ${order.location}</p>
              <p class="text-sm text-gray-600">الوقت: ${new Date(order.createdAt).toLocaleString()}</p>
              <p class="text-sm text-blue-600 font-semibold mt-2">الحالة: جاري التنفيذ</p>
            `;
            container.appendChild(el);
          });
        }
      } else {
        window.location.href = "login.html";
      }
    });
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans">
  <!-- رأس الصفحة -->
  <header class="bg-blue-500 text-white py-4 shadow-md">
    <h1 class="text-center text-xl font-bold">طلباتي</h1>
  </header>

  <!-- المحتوى -->
  <main class="flex-1 px-4 py-6">
    <div id="orders" class="max-w-md mx-auto">
      <p class="text-gray-400 text-sm text-center">جاري التحميل...</p>
    </div>
  </main>

  <!-- زر رجوع -->
  <footer class="text-center py-4">
    <a href="adham.htm" class="text-blue-600 hover:underline font-semibold">العودة إلى الملف الشخصي</a>
  </footer>
</body>
</html>
