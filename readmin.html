<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تعيين كـ Admin</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCJ83B2SofU5cBoeRN3XE215n2-Z8_HJl4",
      authDomain: "autolease-hub.firebaseapp.com",
      projectId: "autolease-hub",
      storageBucket: "autolease-hub.appspot.com",
      messagingSenderId: "142933547240",
      appId: "1:142933547240:web:fd123d30723c69c799915d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        alert("يجب تسجيل الدخول أولاً.");
        window.location.href = "login.html";
        return;
      }

      // عرّف الفورم
      const form = document.getElementById("adminForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const uidInput = document.getElementById("targetUid").value;

        try {
          await addDoc(collection(db, "admin_requests"), {
            targetUid: uidInput,
            requestedBy: user.uid,
            timestamp: new Date()
          });
          alert("تم إرسال الطلب بنجاح!");
          form.reset();
        } catch (err) {
          console.error("خطأ أثناء الإرسال:", err);
          alert("حدث خطأ أثناء إرسال الطلب.");
        }
      });
    });
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
  <div class="bg-white shadow-md rounded-2xl p-6 w-full max-w-md text-center">
    <h1 class="text-xl font-bold mb-4 text-gray-800">طلب تعيين مستخدم كـ Admin</h1>
    <form id="adminForm" class="space-y-4">
      <input type="text" id="targetUid" placeholder="أدخل UID للمستخدم" required
             class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring focus:border-blue-300">
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700 transition">
        إرسال الطلب
      </button>
    </form>
  </div>
</body>
</html>
